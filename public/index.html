<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PushMe Internet Health Map</title>
    <link rel="preconnect" href="https://unpkg.com" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Consumer Sample</p>
          <h1>Internet health from PushMe events</h1>
          <p class="lede">
            Subscribes to connectivity publishers, keeps the latest status per location, and turns the event stream into
            a simple operational map.
          </p>
        </div>
        <div class="stats" id="stats"></div>
      </header>
      <main class="layout">
        <section class="panel map-panel">
          <div class="panel-head">
            <h2>Map</h2>
            <p id="last-poll">Waiting for first sync...</p>
          </div>
          <div id="map"></div>
        </section>
        <section class="panel sidebar">
          <div class="panel-head">
            <h2>Node status</h2>
          </div>
          <div id="node-list" class="node-list"></div>
        </section>
        <section class="panel feed-panel">
          <div class="panel-head">
            <h2>Recent events</h2>
          </div>
          <div id="event-feed" class="event-feed"></div>
        </section>
      </main>
    </div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
